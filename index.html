<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shiva ❤️ Harika</title>

<style>
*{margin:0;padding:0;box-sizing:border-box}

body{
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  font-family:system-ui;
  overflow:hidden;

  /* ✅ FACE SAFE BACKGROUND */
  background:url('./background.jpg') center top no-repeat;
  background-size:contain;
  background-color:#000;
}

/* soft overlay */
body::before{
  content:"";
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.35);
  z-index:0;
}

.card{
  position:relative;
  z-index:2;
  background:rgba(255,255,255,0.92);
  backdrop-filter:blur(10px);
  padding:30px;
  border-radius:20px;
  width:min(90vw,520px);
  text-align:center;
  box-shadow:0 15px 40px rgba(0,0,0,0.3);
}

h1{
  color:#d81b60;
  margin-bottom:8px;
}

.names{
  display:flex;
  justify-content:center;
  gap:10px;
  margin-bottom:15px;
  font-weight:bold;
}

.names span{
  background:#ffe0ec;
  padding:6px 12px;
  border-radius:999px;
}

button{
  padding:12px 20px;
  border:none;
  border-radius:12px;
  background:#ff4d88;
  color:white;
  font-weight:bold;
  cursor:pointer;
  margin-top:12px;
}

input{
  padding:12px;
  border-radius:12px;
  border:2px solid #ffd0e0;
  width:100%;
  margin-top:10px;
}

#loveWrap{
  display:none;
  position:fixed;
  inset:0;
  justify-content:center;
  align-items:center;
  background:rgba(0,0,0,0.5);
  z-index:5;
}

.letter{
  background:white;
  padding:25px;
  border-radius:20px;
  width:min(90vw,600px);
  text-align:center;
}

img{
  width:260px;
  max-width:80vw;
  border-radius:16px;
  margin-top:15px;
  box-shadow:0 10px 25px rgba(0,0,0,0.2);
}

.secret{
  margin-top:10px;
  color:#d81b60;
  font-weight:bold;
}
</style>
</head>

<body>

<div class="card" id="card">
  <h1>Will you be mine forever? 💖</h1>

  <div class="names">
    <span>From: Shiva</span>
    <span>To: Harika</span>
  </div>

  <button onclick="openPassword()">Yes 💕</button>
</div>

<div id="loveWrap">
  <div class="letter">

    <div id="step1">
      <h2>Okay… deep breath 😌💗</h2>

      <!-- ✅ Date Removed Completely -->
      <p style="margin-top:10px;font-weight:bold;color:#c2185b;">
        It wasn’t just a day… it was the moment our two worlds chose the same forever ✨
      </p>

      <p style="margin-top:6px;">
        Enter our forever code to open the envelope 💌
        <span style="opacity:0.7;">(MMDDYYYY)</span>
      </p>

      <input type="password" id="date" maxlength="8" inputmode="numeric"
      placeholder="Password (MMDDYYYY)">

      <button onclick="checkPassword()">Unlock ✨</button>

      <div id="secret" class="secret"></div>
    </div>

    <div id="step2" style="display:none;">
      <h2>Shiva ❤️ Harika</h2>

      <p id="typed" style="margin-top:10px;"></p>

      <!-- ✅ Couple photo inside letter -->
      <img src="./couple.jpg">

      <p style="margin-top:10px;font-weight:bold;color:#c2185b;">— Shiva</p>
    </div>

  </div>
</div>

<script>

const PASSWORD = "04142022";  // hidden code

function openPassword(){
  document.getElementById("loveWrap").style.display="flex";
}

function checkPassword(){
  const value=document.getElementById("date").value.trim();
  const secret=document.getElementById("secret");

  if(value===PASSWORD){
    document.getElementById("step1").style.display="none";
    document.getElementById("step2").style.display="block";
    typeLetter();
  }else{
    secret.textContent="Hmm… try again 😝";
  }
}

function typeLetter(){
  const text="Harika, You are my peace, my happiness, and my forever. I choose you every single day ❤️";
  let i=0;
  const el=document.getElementById("typed");
  el.innerHTML="";
  const interval=setInterval(()=>{
    el.innerHTML+=text[i];
    i++;
    if(i>=text.length) clearInterval(interval);
  },30);
}
</script>

</body>
</html>
